name: EAS Post-build Inspect (free, no build credits)

# Runs the actual Gradle assembly locally in CI (eas-cli's `build:inspect
# --stage post-build`) instead of on EAS's cloud build workers — same
# diagnostic technique as eas-inspect-prebuild.yml, one stage further.
# EAS cloud builds only report a generic EAS_BUILD_UNKNOWN_GRADLE_ERROR with
# no stack trace attached to the GraphQL response; this surfaces the real
# Gradle failure output directly in the Actions log, for free.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `eas build:inspect` spawns eas-cli-local-build-plugin, which runs the
      # SAME native build steps as an EAS cloud build (expo prebuild +
      # gradlew) but on this runner. Without a real JDK/Android SDK, that
      # local build fails during job setup before it ever reaches Gradle —
      # which is what happened last run (job finished in ~2s after config
      # load, no gradlew output at all: it never got that far).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # eas-cli's build:inspect swallows the real error on failure (its own
      # catch block only prints a generic hint, and only when --verbose is
      # OFF — with --verbose ON, which we need for the native build's
      # inherited stdout/stderr, a failure before that subprocess spawns
      # produces zero output). Two runs of this workflow both "succeeded" in
      # under 30s with no gradlew output at all — proof it's failing before
      # ever reaching the native build, silently. Install a throwaway copy
      # and patch that swallowing away so we can actually see why.
      - name: Install and patch a scratch copy of eas-cli for debugging
        run: |
          npm install --no-save --prefix /tmp/eas-cli-local eas-cli@21.1.0
          node scripts/eas-inspect-debug-patch.js /tmp/eas-cli-local/node_modules/eas-cli/build/commands/build/inspect.js

      - name: Run EAS post-build stage (runs Gradle locally, no credits consumed)
        run: >-
          node /tmp/eas-cli-local/node_modules/eas-cli/bin/run build:inspect
          --platform android
          --stage post-build
          --profile preview
          --output /tmp/eas-postbuild-output
          --force
          --verbose
