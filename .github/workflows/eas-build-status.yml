name: EAS Build Status

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/eas-build-status.yml
  workflow_dispatch:
    inputs:
      build_id:
        description: EAS build ID to monitor
        required: true
        type: string

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      BUILD_ID: ${{ inputs.build_id || 'a62da56d-72b6-4e3e-bf6d-ff9d91ecfc3b' }}
    steps:
      - name: Monitor EAS build
        shell: bash
        run: |
          query='query BuildsByIdQuery($buildId: ID!) { builds { byId(buildId: $buildId) { id status platform error { errorCode message docsUrl } artifacts { buildUrl applicationArchiveUrl buildArtifactsUrl } buildProfile createdAt completedAt } } }'

          for attempt in $(seq 1 50); do
            jq -n --arg query "$query" --arg id "$BUILD_ID" \
              '{query: $query, variables: {buildId: $id}}' > /tmp/eas-request.json
            curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $EXPO_TOKEN" \
              --header "Content-Type: application/json" \
              --data @/tmp/eas-request.json \
              https://api.expo.dev/graphql > /tmp/eas-response.json

            if jq -e '.errors and (.errors | length > 0)' /tmp/eas-response.json > /dev/null; then
              jq '{errors}' /tmp/eas-response.json
              exit 1
            fi

            jq '.data.builds.byId' /tmp/eas-response.json > /tmp/eas-build.json

            if [ "$(jq -r 'type' /tmp/eas-build.json)" = "null" ]; then
              echo "Build $BUILD_ID was not returned for the linked Expo project."
              exit 1
            fi

            status=$(jq -r '.status | ascii_downcase' /tmp/eas-build.json)
            echo "EAS build status: $status (check $attempt/50)"

            case "$status" in
              finished)
                jq '{id, status, platform, artifacts, buildProfile, createdAt, completedAt}' /tmp/eas-build.json
                exit 0
                ;;
              errored|canceled)
                jq '{id, status, platform, error, createdAt, completedAt}' /tmp/eas-build.json
                exit 1
                ;;
            esac

            sleep 30
          done

          echo "EAS build did not reach a terminal state within 25 minutes."
          exit 1
